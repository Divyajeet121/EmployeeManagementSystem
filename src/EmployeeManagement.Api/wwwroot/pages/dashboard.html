<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/site.css" rel="stylesheet" />
</head>
<body>
    <div id="navbarPlaceholder"></div>

    <div class="container">
        <h4 class="mb-4">Dashboard</h4>

        <div id="dashboardAlert" class="alert alert-danger d-none" role="alert"></div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card card-summary bg-total">
                    <div class="card-body">
                        <div class="text-uppercase small">Total Employees</div>
                        <div class="summary-value" id="totalEmployees">--</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-summary bg-active">
                    <div class="card-body">
                        <div class="text-uppercase small">Active Employees</div>
                        <div class="summary-value" id="activeEmployees">--</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-summary bg-inactive">
                    <div class="card-body">
                        <div class="text-uppercase small">Inactive Employees</div>
                        <div class="summary-value" id="inactiveEmployees">--</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a class="btn btn-primary" href="employees.html">Go to Employee Management</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
